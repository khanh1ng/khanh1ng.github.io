---
layout: default
---
<article class="post">
  <header class="post-header">
    {% if page.tag %}<span class="mono eyebrow">{{ page.tag }}</span>{% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta mono">{{ page.date | date: "%B %e, %Y" }}{% if page.reading_time %} · {{ page.reading_time }}{% endif %}</p>
    {% if page.summary %}<p class="post-summary">{{ page.summary }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <p class="post-back"><a href="{{ '/writing/' | relative_url }}">← All writing</a></p>
</article>
