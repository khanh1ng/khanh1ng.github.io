---
layout: default
title: Writing
---

<section class="section">
  <h2 class="section-title">Writing</h2>
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="mono">{{ post.date | date: "%b %e, %Y" }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
